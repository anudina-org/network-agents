services:
  agent:
    build: .
    command: uvicorn agent_server:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"

  ui:
    build: .
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    env_file: .env
    environment:
      - AGENT_API_URL=http://agent:8000
    ports:
      - "8501:8501"
    depends_on:
      - agent
