---
# Prerequisites (run once):
#   oc create secret generic network-agents-secret \
#     --from-literal=LLM_PROVIDER=ollama \
#     --from-literal=OLLAMA_MODEL=qwen2.5 \
#     --from-literal=OLLAMA_BASE_URL=http://ollama:11434 \
#     --from-literal=GOOGLE_API_KEY=<value> \
#     --from-literal=GOOGLE_MODEL=gemini-2.5-flash-lite \
#     --from-literal=LANGCHAIN_TRACING_V2=true \
#     --from-literal=LANGCHAIN_API_KEY=<value> \
#     --from-literal=LANGCHAIN_PROJECT=network-agents-cost-tracing \
#     -n ai-agentic

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-agent-server
  namespace: ai-agentic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-agent-server
  template:
    metadata:
      labels:
        app: network-agent-server
    spec:
      containers:
      - name: network-agent-server
        image: docker.io/anandms2026/network-agents:uat
        imagePullPolicy: Always
        command: ["uvicorn", "agent_server:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: network-agents-secret
---
apiVersion: v1
kind: Service
metadata:
  name: network-agent-server
  namespace: ai-agentic
spec:
  selector:
    app: network-agent-server
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-agent-ui
  namespace: ai-agentic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-agent-ui
  template:
    metadata:
      labels:
        app: network-agent-ui
    spec:
      containers:
      - name: network-agent-ui
        image: docker.io/anandms2026/network-agents:uat
        imagePullPolicy: Always
        command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
        ports:
        - containerPort: 8501
        envFrom:
        - secretRef:
            name: network-agents-secret
---
apiVersion: v1
kind: Service
metadata:
  name: network-agent-ui
  namespace: ai-agentic
spec:
  selector:
    app: network-agent-ui
  ports:
  - port: 8501
    targetPort: 8501
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: network-agent-ui
  namespace: ai-agentic
  labels:
    app: network-agent-ui
spec:
  host: network-agent-ui.ocp.anudina.com
  port:
    targetPort: 8501
  to:
    kind: Service
    name: network-agent-ui
    weight: 100
  wildcardPolicy: None
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: network-agent-server
  namespace: ai-agentic
  labels:
    app: network-agent-server
spec:
  host: network-agent-server.ocp.anudina.com
  port:
    targetPort: 8000
  to:
    kind: Service
    name: network-agent-server
    weight: 100
  wildcardPolicy: None
